<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEGUIDO</title>
    <style>
    
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color:#31C1E1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
            width: 90%;
            max-width: 400px;
        }

        /* Efeito Pulse no Coração */
        .imagem-de-coracao {
            font-size: 60px;
            display: inline-block;
            margin-bottom: 20px;
            animation: pulse 1.5s ease-in-out infinite;
            cursor: pointer;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* Texto com efeito de digitação */
        .escrita-texto {
            font-size: 38px;
            color: white;
            min-height: 1.6em; /* Evita que o layout pule ao carregar */
            font-weight: 700;
            letter-spacing: 2px;
        }
          .input{
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            background-color: white;
            color: black;
            border: none;
            font-weight: 800;
            font-size: large;
            box-shadow: 2px 0px 2px px white;
          }
          .input a{
            text-decoration: none;
            list-style: none;
            color: black;
          }
        .cursor {
            display: inline-block;
            width: 3px;
            background-color: #ffffff;
            margin-left: 5px;
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        
        @media (max-width: 350px) {
            .heart-icon { font-size: 60px; }
            .typing-text { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="container">

        
        <div class="escrita-texto" id="texto-container"></div>
        <span class="cursor">|</span>
        <div class="imagem-de-coracao"><img src="Coracaozinho_a_bater-removebg-preview.png" alt="imagem de coracaozinho " width="60%" height="60%"></div>
        
        <button class="input"><a href="TELA DE MENU.html">Seguir</a></button>
    </div>

    <script>
        // JavaScript - Efeito para as letras "Soletrar" (Typewriter)
        const textElement = document.getElementById('texto-container');
        const message = "BEM VINDO AO SEU APLICATIVO SAUDAVEL! AQUI JUNTOS CUIDAMOS DA SUA, DA NOSSA E DA MINHA SAUDE!"; // Altere sua frase aqui
        let index = 0;

        function typeWriter() {
            if (index < message.length) {
                textElement.innerHTML += message.charAt(index);
                index++;
                setTimeout(typeWriter, 100); 
            }
        }

        // Inicia a animação ao carregar a página
        window.onload = typeWriter;
    </script>

</body>
</html>

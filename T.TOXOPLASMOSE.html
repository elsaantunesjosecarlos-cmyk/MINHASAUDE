<!DOCTYPE html>

<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #46b4d1;
            background-size: cover;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
        }

        .header {
            background-color: blue;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .header h1 {
            color: white;
            font-style: italic;
            font-weight: bold;
            font-size: 32px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .menu {
            position: absolute;
            nav-right: 20px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .menu div {
            width: 35px;
            height: 4px;
            background-color: white;
            border-radius: 20px;
        }

        .barra1 {
            position: fixed;
            right: -250px;
            top: 0;
            width: 250px;
            height: 100%;
            background-color: rgb(119, 193, 199);
            box-shadow: -2px 0 5px rgba(0, 0, 0, 0, 2);
            transition: 0.5s;
            z-index: 10;
            padding-top: 60px;
        }

        .barra1:active {
            right: 0;
        }

        .barra1 h2{
            padding: 20px;
            color:white;
            border-bottom: 1px solid#ddd;
            
        }

        .barra1 a{
            padding: 15px 25px;
            text-decoration: none;
            font-size: 28px;
            color:#333;
            display:block;
            transition: 0.5s;
        }
        .barra1 a:hover{
            background: color #f0f0f0;;
        }
        .container{
            margin-top: 30px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap:20px;
        }

        .btn-sinais{
            margin: 20px;
         background-color: white;
         color:#222;
         border: none;
         padding: 25px 40px;
         border-radius: 15px;
         font-size: 24px;
         font-weight: bold;
         width: 50%;
         max-width: 400px;
         cursor: pointer;
         box-shadow: 0 4px 6px rgba(0, 0, 0, 0, 1);
        box-shadow: 0px 2px 10px rgb(246, 249, 250); 
        }
        .btn-sinais a{
            text-decoration: none;
            list-style: none;
            color: black;
        }

        .pulse-text {
            font-size: 24px;
            font-weight: bold;
            font-family: sans-serif;
            text-transform: uppercase;
            text-align: center;
            animation: pulseColors 4s infinite ease-in-out;
        }

        @keyframes pulseColors {
            0% {
                color: white;
                transform: scale(1);
            }
            33% {
                color: black;
                transform: scale(1.1); /* Aumenta levemente */
            }
            66% {
                color: red;
                transform: scale(1); /* Volta ao normal */
            }
            100% {
                color: white;
                transform: scale(1.1);
            }
        }    

        .btn-voltar{
            margin-top: 120px;
            margin-left: 80px;
            background-color: white;
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 20px;
            box-shadow: 0px 2px 10px rgb(246, 249, 250); 
        
        }
           .btn-voltar a{
            text-decoration: none;
            list-style: none;
            color: rgb(19, 15, 15);
        }      
        .overlay{
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width:100%;
            height: 100%;
            background: rgba(0, 0, 0, 0, 3);
            z-index: 5;
        }

        .overlay:active{
            display: block;
        }
        

    </style>

</head>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <title>MENU</title>

  <style>
    body {
      background-color: #31C1E1;
      justify-content: center;
      text-align: center;
    }



    h2 {
      font-size: 30px;
      text-align: center;
      font-weight: 900;
      font-family: italic;
    }

    .circulo {
      background-color: white;
      border-radius: 50%;
      color: #000000;
      display: flex;
      text-align: center;
      justify-content: center;
      align-items: center;
    }

    .circulo h2 {
      color: black;
      text-align: left;
      font-weight: 400;

    }


    .borda {
      max-width: 400px;
      margin: 50px auto;
      padding: 20px;
      background: transparent;
      border-radius: 12px;
      color: white;
      font-weight: 800;
      text-align: right;
      justify-content: center;
      height: 500px;
      text-align: left;
      border: 1px solid black;
      box-shadow: 0px 0px 6px rgb(1, 2, 2);
    }

    .borda {
      text-align: left;
    }


    input {
      margin-bottom: 20px;
      width: 300px;
      padding: 8px;
      border-radius: 10px;
      text-align: left;
    }



    .caixa {
      margin-top: 40px;
      font-size: large;
      justify-content: center;
      text-align: center;
      align-items: center;
    }



    button {
      background-color: #ffffff;
      color: #000000;
      border: 1px solid #000000;
      padding: 12px 28px;
      font-size: 15px;
      border-radius: 10%;
      cursor: pointer;
      transition: 0.25s;
      text-align: center;
      justify-content: center;
      position: relative;
      top: 70px;
      left: 150px;
      border: 2px solid black;
      box-shadow: 0px 0px 10px rgb(1, 6, 7);
    }

    .botao {
      margin-right: 300px;
      text-align: center;
    }
    .botao a{
      list-style: none;
      text-decoration: none;
    }


    button:hover {
      background: black;
      color: white;

    }

    @media {
      (max-width: 600px) {
            h1 { font-size: 2rem; }
            h2 { font-size: 1.8rem; }
            borde {
              max-width: 300px;
            }
    }
  </style>
</head>

<body>
  <div class="circulo">
    <div class="circulo1">
      <h2>Minha Saude</h2>
    </div>
  </div>

  <div class="borda">
    <form action="registroForm">
    <div class="caixa">
      <label for="nome">Nome:</label>
      <input type="text" id="nome" name="nome" required>
    </div>

    <div class="caixa">
      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required>

    </div>

    <div class="caixa">
      <label for="senha">Senha:</label>
      <input type="password" id="senha" name="senha" required>



      <button class="botao"><a href="TELA NOVA.html">Login</a></button>
    </div>
    
    </form><br>
    
    <br><br> <br>
    <button><a href="index.html">Voltar</a></button>
</body>

</html>


<script>
  const form = document.getElementById('registroForm');
  const senha = document.getElementById('senha');
  const confirmarSenha = document.getElementById('confirmarSenha');
  const mensagemErro = document.getElementById('mensagemErro');

  form.addEventListener('submit', function (event) {

    event.preventDefault(event);


    if (senha.value !== confirmarSenha.value) {
      mensagemErro.style.display = 'block'; 
      confirmarSenha.focus(); 
      return;
    } else {
      mensagemErro.style.display = 'none';
    }

   

    console.log('Formulário enviado com sucesso!');
    alert('Registro realizado com sucesso! (Simulação)');

  });

</script>

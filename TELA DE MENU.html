<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MENU</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #46b4d1;
            background-size: cover;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
        }

        .header {
            background-color: rgb(5, 71, 102);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .header h1 {
            color: white;
            font-style: italic;
            font-weight: bold;
            font-size: 32px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .menu {
            position: absolute;
            right: 20px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .menu {
            position: absolute;
            right: 20px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 5px;
            z-index: 11;
            /* Garante que fique acima de tudo */
        }

        .menu div {
            width: 35px;
            height: 4px;
            background-color: white;
            border-radius: 20px;
        }

        .barra1 {
            position: fixed;
            right: -250px;
            top: 0;
            width: 250px;
            height: 100%;
            background-color: rgb(66, 169, 225);
            box-shadow: -2px 0 5px rgba(0, 0, 0, 0, 2);
            transition: 0.5s;
            z-index: 10;
            padding-top: 60px;
        }

        .barra1:open {
            right: 0;
        }

        .barra1 h2 {
            padding: 20px;
            color: white;
            border-bottom: 1px solid#ddd;

        }

        .barra1 a {
            padding: 15px 25px;
            text-decoration: none;
            font-size: 28px;
            color: #333;
            display: block;
            transition: 0.5s;
        }

        .barra1 a:hover {
            background: color #f0f0f0;
            ;
        }

        .container {
            margin-top: 30px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .card {
            margin: 20px;
            background-color: white;
            color: #222;
            border: none;
            padding: 25px 40px;
            border-radius: 15px;
            font-size: 24px;
            font-weight: bold;
            width: 50%;
            max-width: 400px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0, 1);
            box-shadow: 0px 2px 10px rgb(246, 249, 250);
        }

        .card a {
            text-decoration: none;
            list-style: none;
            color: black;
        }

        .card {
            animation: pulse infinite;

        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.2);
            }
        }

        .btn-voltar {
            margin-top: 120px;
            margin-left: 80px;
            background-color: white;
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 20px;
            box-shadow: 0px 2px 10px rgb(246, 249, 250);

        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0, 3);
            z-index: 5;
        }

        .overlay:open {
            display: block;
        }
    </style>

</head>

<body>

    <header class="header">
        <h1>MENU DE ANAMNESE</h1>

        <div class="menu" onclick="ToggleEvent()">
            <div></div>
            <div></div>
            <div></div>
        </div>
    </header>

    <div class="overlay" id="overlay" onclick="ToggleEvent()"></div>

    <div class="barra1" id="barra1">

        <h2>✅DEFINICOES</h2>

        <a href="#">👤Perfil</a>

        <a href="#">⏰Alarme</a>

        <a href="#" style="margin-top:50px; color:red;">Sair</a>

    </div>

    <main class="container">

        <button class="card"><a href="D.cabeca.html">TENHO DOR DE CABECA</a></button>

        <button class="card"><a href="FEBRES.html">TENHO FEBRES</a></button>

        <button class="card" href="Menu de anamnese principal.html"><a
                href="Menu de anamnese principal.html">QUERO SABER MAIS</a></button>

    </main>

    <footer class="footer">

        <button class="btn-voltar"><a href="TELA NOVA.html">Voltar</a></button>

    </footer>

    <script src="TELA DE MENU.js">

          const cards = document.querySelectorAll('.card');
        cards.forEach(card => {
            card.addEventListener('mouseenter', () => card.classList.add('pulse'));
            card.addEventListener('mouseleave', () => card.classList.remove('pulse'));
        });
    </script>
</body>


</html>
